name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest # Docker preinstalled — Testcontainers works out of the box
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Unit tests
        run: dotnet test tests/Itaris.Tests.Unit --no-build --configuration Release

      - name: Architecture tests
        run: dotnet test tests/Itaris.Tests.Architecture --no-build --configuration Release

      - name: Integration tests (Testcontainers PostgreSQL)
        run: dotnet test tests/Itaris.Tests.Integration --no-build --configuration Release

  docker-image:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f src/Itaris.Api/Dockerfile -t itaris-api:ci .
