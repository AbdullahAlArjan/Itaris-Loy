services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: itaris
      POSTGRES_USER: itaris
      POSTGRES_PASSWORD: itaris # local dev only — never reuse outside compose
    ports:
      # Host 5433: this machine (and many dev machines) already runs a local PostgreSQL on 5432
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U itaris -d itaris"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: src/Itaris.Api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=itaris;Username=itaris;Password=itaris
    ports:
      - "8080:8080"

volumes:
  postgres-data:
